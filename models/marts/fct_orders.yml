# 1. 语义模型（顶级块）
semantic_models:
  - name: fct_orders
    model: ref('fct_orders')
    enabled: true
    # 关键补丁：新版规范通常要求定义默认的时间维度
    defaults:
      agg_time_dimension: order_date

    entities:
      - name: order_id
        type: primary
      - name: customer
        type: foreign

    measures:
      - name: order_total
        description: "订单总金额"
        agg: sum
        expr: amount
      - name: order_count
        description: "订单总量"
        agg: count
        expr: order_id
      - name: total_tax_amount
        description: "总税额"
        agg: sum
        expr: tax_amount

    dimensions:
      - name: order_date
        type: time
        type_params:
          time_granularity: day
      # 修正点：categorical 类型不需要 type_params，直接定义即可
      - name: status
        type: categorical

# 2. 指标（顶级块）
metrics:
  - name: total_revenue
    label: "总营收"
    type: simple
    type_params:
      measure: order_total

  - name: tax_collected
    label: "实收税额"
    type: simple
    type_params:
      measure: total_tax_amount