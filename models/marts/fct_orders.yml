# 1. 语义模型定义（顶级块）
semantic_models:
  - name: fct_orders
    model: ref('fct_orders')
    enabled: true              # 解决 dbt1013 错误
    defaults:
      agg_time_dimension: order_date

    entities:
      - name: order_id
        type: primary
      - name: customer
        type: foreign

    measures:
      - name: order_total
        agg: sum
        expr: amount
      - name: order_count
        agg: count
        expr: order_id
      - name: total_tax_amount
        agg: sum
        expr: tax_amount

    dimensions:
      - name: order_date
        type: time
        type_params:
          time_granularity: day
      - name: status          # categorical 级别，不带 type_params，解决 dbt1060 错误
        type: categorical

# 2. 指标定义（顶级块）
metrics:
  - name: total_revenue
    label: "总营收"
    type: simple
    type_params:
      measure: order_total

  - name: average_order_value
    label: "平均订单价"
    type: derived
    type_params:
      expr: revenue / orders
      metrics:
        - name: total_revenue
          alias: revenue
        - name: order_count
          alias: orders