models:
  - name: fct_orders
    # 新版核心：直接在模型上启用语义层
    semantic_model:
      enabled: true 

    # 默认时间聚合维度（新版：模型属性）
    agg_time_dimension: order_date

    description: 订单模型（关联客户信息，一行一个订单）

    columns:
      - name: order_id
        description: 订单唯一ID
        # 列级别：主键实体（新版写法）
        entity:
          name: order
          type: primary

      - name: customer_id
        description: 客户ID
        # 列级别：外键实体
        entity:
          name: customer
          type: foreign

      - name: order_date
        description: 订单创建日期
        # 列级别：时间维度 + 粒度
        granularity: day
        dimension:
          type: time

      - name: customer_name
        description: 客户姓名
        # 列级别：分类维度
        dimension:
          type: categorical

    # 新版：直接在模型内定义指标
    metrics:
      - name: amount
        type: simple
        agg: sum
        expr: 1

      - name: order_count
        type: simple
        agg: count
        expr: 1