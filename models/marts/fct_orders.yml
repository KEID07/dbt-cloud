version: 2

semantic_models:
  - name: fct_orders
    model: ref('fct_orders')
    
    # 1. 实体：定义关联的“键”
    entities:
      - name: order_id
        type: primary
      - name: customer
        type: foreign

    # 2. 度量：定义基础的聚合逻辑（这是指标的原材料）
    measures:
      - name: order_total
        description: "订单总金额"
        agg: sum
        expr: amount
      - name: order_count
        description: "订单总量"
        agg: count
        expr: order_id

    # 3. 维度：定义切分指标的角度（必须包含一个时间维度）
    dimensions:
      - name: order_date
        type: time
        type_params:
          time_granularity: day
